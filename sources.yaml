  # ================= PLATFORM (Trends) — read via culture-watchers, never scraped =================
  # No SEO "trends" listicles, no marketing-aggregator blogs. Platform velocity is
  # read THROUGH the trusted watchers above (After School, WHAT'S ANU, Dazed, MØRNING).
  - name: Google Trends
    type: platform
    access_tier: platform_gated
    method: direct check (trends.google.com) for corroboration only
    categories: [trends]

  - name: Reddit
    type: platform
    access_tier: platform_gated
    method: search for the questions people are actually asking
    categories: [industry_buzz, trends]

  - name: TikTok / Instagram
    type: platform
    access_tier: platform_gated
    method: read via registered culture-watchers (After School, WHAT'S ANU, Dazed, MØRNING) — do not scrape, do not use aggregator round-ups
    categories: [trends]
