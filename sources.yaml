# Source registry for the Industry Tracker.
#
# type:         trade | cultural | trend_studio | substack | platform
# access_tier:  clean (freely fetchable) | framing_only (paywall/subscription — headlines + discourse)
#               | curated_substack (RSS) | platform_gated (read via culture-watchers, not scraped)
# feed:         verified RSS URL, or "discover-at-run" (resolve via search at brief time)
# cadence:      for trend_studios — they publish periodically, not daily
# categories:   which brief sections this source feeds

sources:

  # ================= TRADE (Industry Buzz, POVs) =================
  # WARC, Contagious and The Work are all part of the LIONS / Informa
  # intelligence stack and are subscription-gated. Use their publicly
  # reported findings and published report summaries; don't assume full-text.
  - name: WARC
    type: trade
    access_tier: framing_only
    feed: discover-at-run        # warc.com — subscription
    note: effectiveness research + case studies; LIONS/Informa
    categories: [industry_buzz, povs]

  - name: Contagious
    type: trade
    access_tier: framing_only
    feed: discover-at-run        # contagious.com — subscription
    note: creative & strategy intelligence; LIONS/Informa
